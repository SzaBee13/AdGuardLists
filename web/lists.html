<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AdGuard Lists | List Browser</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						display: ['"Space Grotesk"', 'sans-serif'],
						mono: ['"IBM Plex Mono"', 'monospace'],
					},
				},
			},
		};
	</script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
	<script src="scripts/index.js" defer type="module"></script>
	<link rel="icon" type="image/svg+xml" href="/assets/logo.nobg.svg">
	<link rel="icon" type="image/png" href="/assets/logo.nobg.png">
  <!-- Open Graph -->
  <meta property="og:title" content="AdGuard Lists | List Browser">
  <meta property="og:description" content="Browse curated DNS list files for AdGuard.">
  <meta property="og:image" content="https://adguardlists.szabee.me/assets/logo.png">
  <meta property="og:url" content="https://adguardlists.szabee.me/web/lists.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AdGuard Lists | List Browser">
  <meta name="twitter:description" content="Browse curated DNS list files for AdGuard.">
  <meta name="twitter:image" content="https://adguardlists.szabee.me/assets/logo-wide.png">
</head>
<body data-page="lists" class="min-h-screen bg-slate-950 text-slate-100 antialiased">
	<div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_15%_15%,rgba(34,197,94,0.18),transparent_35%),radial-gradient(circle_at_75%_0%,rgba(6,182,212,0.2),transparent_45%)]"></div>
	<main class="mx-auto max-w-6xl px-6 py-10 sm:px-10 lg:py-14">
		<header class="flex flex-wrap items-end justify-between gap-4">
			<div>
				<p class="font-mono text-xs uppercase tracking-[0.2em] text-cyan-300">AdGuard Lists</p>
				<h1 class="mt-2 font-display text-3xl font-bold text-white sm:text-4xl">List Browser</h1>
				<p class="mt-2 text-sm text-slate-300 sm:text-base">Live list paths and metadata loaded from your repository.</p>
			</div>
			<a href="index.html" class="rounded-md border border-slate-600 px-4 py-2 text-sm font-semibold text-slate-200 transition hover:border-slate-300 hover:text-white">Back to Home</a>
		</header>

		<p id="listStatus" class="mt-6 text-sm text-slate-300">Preparing list data...</p>

		<section id="listSummary" class="mt-5 grid gap-3 sm:grid-cols-3"></section>

		<section class="mt-6">
			<label for="listSearch" class="mb-2 block font-mono text-xs uppercase tracking-[0.2em] text-slate-400">Search</label>
			<input
				id="listSearch"
				type="search"
				placeholder="Search by title, description, or path"
				class="w-full rounded-xl border border-slate-700 bg-slate-900/70 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/30"
			>
		</section>

		<section class="mt-6 grid gap-6 lg:grid-cols-2">
			<div>
				<h2 class="font-display text-2xl font-semibold text-emerald-100">Block Lists</h2>
				<p class="mt-1 text-sm text-slate-400">Entries used for blocking domains.</p>
				<div id="blockListGrid" class="mt-4 grid gap-4"></div>
			</div>
			<div>
				<h2 class="font-display text-2xl font-semibold text-cyan-100">Unblock Lists</h2>
				<p class="mt-1 text-sm text-slate-400">Entries used for allowing domains.</p>
				<div id="unblockListGrid" class="mt-4 grid gap-4"></div>
			</div>
		</section>
	</main>
</body>
</html>
